<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELUSIVE DECODER</title>
    <!-- Подключаем стильный футуристичный шрифт для заголовков и кнопок -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* 1. Адаптивный задний фон, зашитый прямо в код (Base64) */
        body {
            background-color: #1a1c1e;
            /* Ваша картинка с логотипом интегрирована прямо сюда, файлы на диске больше не нужны */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%231a1c1e"/><circle cx="85" cy="15" r="8" fill="%23b63626" opacity="0.3"/><path d="M75,10 Q85,5 95,10 Q90,20 85,15 Q80,20 75,10 Z" fill="%23101112"/><path d="M10,90 Q40,60 90,40" stroke="%232a2d32" stroke-width="4" fill="none" opacity="0.4"/></svg>'), 
                             linear-gradient(135deg, #101112 0%, #2a2d32 50%, #44201b 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 2. Главная панель криптомодуля */
        .crypto-panel {
            background-color: rgba(30, 32, 36, 0.94); /* Глубокий темный тон из вашей палитры */
            border: 1px solid rgba(226, 228, 231, 0.15);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Заголовок в шрифте Orbitron */
        .crypto-panel h1 {
            font-family: 'Orbitron', sans-serif;
            color: #e2e4e7;
            font-size: 26px;
            letter-spacing: 4px;
            margin-top: 0;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        /* 3. Блок инструкции для пользователя */
        .instruction-box {
            background-color: rgba(182, 54, 38, 0.08);
            border: 1px dashed rgba(182, 54, 38, 0.3);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 13px;
            color: rgba(226, 228, 231, 0.8);
            line-height: 1.5;
        }
        .instruction-box strong {
            color: #b63626;
        }

        /* 4. Окно ввода со скругленными краями */
        .input-area {
            width: 100%;
            height: 110px;
            background-color: rgba(15, 16, 18, 0.85);
            border: 1px solid rgba(182, 54, 38, 0.4);
            border-radius: 12px; /* Идеально скругленные края */
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            padding: 15px;
            box-sizing: border-box;
            resize: none;
            outline: none;
            letter-spacing: 2px;
            transition: border-color 0.3s ease;
        }

        .input-area:focus {
            border-color: #b63626;
        }

        .input-area::placeholder {
            color: rgba(226, 228, 231, 0.3);
            font-size: 14px;
        }

        /* 5. Кнопка действия в шрифте Orbitron и ржаво-красном цвете */
        .btn-decrypt {
            font-family: 'Orbitron', sans-serif;
            background-color: #b63626; /* Тот самый красный акцент с фона */
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 16px 30px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
            width: 100%;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(182, 54, 38, 0.2);
        }

        .btn-decrypt:hover {
            background-color: #d13e2b;
            box-shadow: 0 4px 20px rgba(209, 62, 43, 0.4);
        }

        .btn-decrypt:active {
            transform: scale(0.98);
        }

        /* 6. Блок вывода результата */
        .output-panel {
            margin-top: 25px;
            padding: 18px;
            background-color: rgba(10, 11, 12, 0.95);
            border-left: 4px solid #b63626;
            border-radius: 4px;
            text-align: left;
            display: none;
        }

        .output-label {
            font-family: 'Orbitron', sans-serif;
            color: #b63626;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .output-text {
            color: #ffffff;
            font-size: 18px;
            letter-spacing: 1px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="crypto-panel">
        <h1>ELUSIVE DECODER</h1>
        
        <!-- Блок инструкции -->
        <div class="instruction-box">
            <strong>ИНСТРУКЦИЯ КРИПТОАНАЛИЗА:</strong><br>
            Вводите номера букв строго через <strong>пробел</strong>. Чтобы обозначить окончание слова и начать следующее, используйте знак косой черты <strong>/ (слэш)</strong>.
        </div>
        
        <!-- Окно ввода со скругленными краями -->
        <textarea id="codeSource" class="input-area" placeholder="ENTER DIGITAL CODE HERE... (Например: 19 1 13 / 5 20)"></textarea>
        
        <!-- Кнопка запуска -->
        <button class="btn-decrypt" onclick="processLatinDecryption()">DECRYPT BY LINGUISTIC ANALYSIS</button>
        
        <!-- Результат дешифровки -->
        <div id="resultBlock" class="output-panel">
            <div class="output-label">SYSTEM DECRYPTION SUCCESSFUL:</div>
            <div id="outputText" class="output-text"></div>
        </div>
    </div>

    <script>
        // Классический латинский алфавит (без букв J, U, W) для аутентичности квеста
        // Позиция в массиве соответствует вводимой цифре
        const alphabet = ["", "a", "b", "c", "d", "e", "f", "g", "h", "i", "k", "l", "m", "n", "o", "p", "q", "r", "s", "t", "v", "x", "y", "z"];

        function processLatinDecryption() {
            const inputData = document.getElementById('codeSource').value.trim();
            const outputText = document.getElementById('outputText');
            const resultBlock = document.getElementById('resultBlock');

            if (!inputData) {
                alert("Введите цифровой шифр для анализа.");
                return;
            }

            // Парсинг слов по знаку слэша "/"
            let words = inputData.split('/');
            let decryptedWords = [];

            for (let i = 0; i < words.length; i++) {
                // Парсинг букв по пробелу внутри каждого слова
                let letterCodes = words[i].trim().split(/\s+/);
                let currentWord = "";

                for (let j = 0; j < letterCodes.length; j++) {
                    let code = parseInt(letterCodes[j], 10);
                    
                    if (code >= 1 && code < alphabet.length) {
                        currentWord += alphabet[code];
                    } else if (letterCodes[j] !== "") {
                        currentWord += letterCodes[j]; // сохраняем символы, если ввели не число
                    }
                }
                if (currentWord) {
                    decryptedWords.push(currentWord);
                }
            }

            // Объединяем готовые латинские слова пробелами
            let finalResult = decryptedWords.join(' ');

            // Вывод результата в нижнее окно
            outputText.innerHTML = finalResult.toUpperCase(); // Выводим крупными буквами для стиля
            resultBlock.style.display = 'block';
        }
    </script>
</body>
</html>
